# Fly.io 배포 설정 — 서버(Colyseus)만. 클라이언트는 GitHub Pages 정적 호스팅.
# 배포 절차는 DEPLOY.md 참고.
app = "giwa-village"
primary_region = "nrt" # 도쿄 — 한국에서 가장 가까운 리전

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true
  # WebSocket 상시 연결 룸 서버 — 슬립하면 마을이 사라진다
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "giwa_data"
  destination = "/app/server/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
